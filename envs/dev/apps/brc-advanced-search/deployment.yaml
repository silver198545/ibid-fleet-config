apiVersion: apps/v1
kind: Deployment
metadata:
  name: brc-advanced-search
  namespace: brc-advanced-search
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brc-advanced-search
  template:
    metadata:
      labels:
        app: brc-advanced-search
    spec:
      imagePullSecrets:
        - name: ghcr-brc-advanced-search
      containers:
        - name: brc-advanced-search
          image: ghcr.io/silver198545/brc-advanced-search:2.0.0-r1
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          # app.baseURL(nuxt.config.ts)が/advancedのため、ベアの"/"は404になる。
          readinessProbe:
            httpGet:
              path: /advanced/en/
              port: 3000
          livenessProbe:
            httpGet:
              path: /advanced/en/
              port: 3000
