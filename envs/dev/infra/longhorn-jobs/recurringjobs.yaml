# 全Longhornボリューム対象の定期スナップショット/バックアップ。
# groups: ["default"] は明示的なグループ指定のないボリューム全てに適用される。
# cronはUTC基準(バックアップの 0 17 * * * はJST 2:00)。
# バックアップ先は longhorn/fleet.yaml の defaultSettings.backupTarget を参照。
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: snapshot-6h
  namespace: longhorn-system
spec:
  name: snapshot-6h
  task: snapshot
  cron: "0 */6 * * *"
  retain: 4
  concurrency: 2
  groups:
    - default
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: backup-daily
  namespace: longhorn-system
spec:
  name: backup-daily
  task: backup
  cron: "0 17 * * *"
  retain: 7
  concurrency: 2
  groups:
    - default
