# brc-advanced-search (dev環境)のGHCR pull用SealedSecret。
# riken_brc_advanced_search由来のイメージ(ghcr.io/silver198545/brc-advanced-search)は
# ソースが非公開のためパッケージも非公開のままにしており、devクラスタからのpullには
# 認証(read:packages スコープのPersonal access token)が必要。
# 封印された値はこの環境のコントローラでのみ復号できる(他環境へのコピー不可。
# 環境ごとに生成し直すこと。docs/manual-apps.md参照)。
---
# アプリのnamespace。SealedSecretより先に適用されるようバンドルに含める
# (DR時の手動 kubectl create ns を不要にする)。既存namespaceの引き取りは
# fleet.yaml の takeOwnership: true が担う。
apiVersion: v1
kind: Namespace
metadata:
  name: brc-advanced-search
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ghcr-brc-advanced-search
  namespace: brc-advanced-search
spec:
  encryptedData:
    .dockerconfigjson: 
  template:
    metadata:
      name: ghcr-brc-advanced-search
      namespace: brc-advanced-search
    type: kubernetes.io/dockerconfigjson
