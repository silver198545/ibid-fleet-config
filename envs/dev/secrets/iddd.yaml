# サイト iddd (dev環境)の認証情報SealedSecret。
# scripts/seal-site-secrets.sh で生成。封印された値はこの環境のコントローラ
# でのみ復号できる(他環境へのコピー不可。環境ごとに生成し直すこと)。
# パスワードのローテーション手順は docs/manual-wordpress.md 参照。
---
# サイトのnamespace。SealedSecretより先に適用されるようバンドルに含める
# (DR時の手動 kubectl create ns を不要にする)。既存namespaceの引き取りは
# fleet.yaml の takeOwnership: true が担う。
apiVersion: v1
kind: Namespace
metadata:
  name: wordpress-iddd
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wordpress-iddd-credentials
  namespace: wordpress-iddd
spec:
  encryptedData:
    wordpress-password: 
  template:
    metadata:
      name: wordpress-iddd-credentials
      namespace: wordpress-iddd
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wordpress-iddd-mariadb-credentials
  namespace: wordpress-iddd
spec:
  encryptedData:
    mariadb-password: 
    mariadb-root-password: 
  template:
    metadata:
      name: wordpress-iddd-mariadb-credentials
      namespace: wordpress-iddd
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wordpress-iddd-mariadb-upgrade-values
  namespace: wordpress-iddd
spec:
  encryptedData:
    values.yaml: 
  template:
    metadata:
      name: wordpress-iddd-mariadb-upgrade-values
      namespace: wordpress-iddd
