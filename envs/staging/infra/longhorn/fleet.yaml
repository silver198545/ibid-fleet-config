defaultNamespace: longhorn-system
targetNamespace: longhorn-system

# バンドルがGitから消えたりGitRepoが付け替えられたりしても、Fleetにリソースを
# 削除させない(ストレージ層のアンインストール=全ボリューム喪失につながるため)。
keepResources: true

helm:
  releaseName: longhorn
  chart: longhorn
  repo: https://charts.rancher.io
  version: 109.3.1+up1.11.2
  values:
    defaultSettings:
      # 新規インストール時のみ有効。既存クラスタはBackupTarget CR
      # (../longhorn-jobs/backuptarget.yaml)が実効的な設定。
      backupTarget: nfs://192.168.1.1:/data/nfs/longhorn/staging
