defaultNamespace: wordpress-dna
targetNamespace: wordpress-dna

# このサイトをGitから削除してもFleetにリソース(PVC=データ含む)を削除させない。
# サイトの完全削除は docs/manual-wordpress.md の手順に従って手動で行う。
keepResources: true

helm:
  # リリース名を明示する(Fleetのバンドル名由来の自動命名にしない)。
  # 既存の手動デプロイ済みリリースをFleetが引き継ぐためにも必須。
  releaseName: wordpress-dna
  # 全サイト共通デフォルトを内包したラッパーチャート(charts/ibid-wordpress)。
  # バージョンを上げる=このサイトへの変更適用。環境ごとに段階的に昇格させる。
  chart: oci://ghcr.io/silver198545/charts/ibid-wordpress
  version: "0.2.1"
  # BitnamiのmariadbサブチャートはHelmアップグレード時、existingSecretを
  # 使っていてもauth.rootPassword/auth.passwordの明示指定を要求してくる
  # (PASSWORDS ERROR)。Gitにパスワードを書かないよう、
  # scripts/bootstrap-site-secrets.sh で事前作成したSecret経由で注入する。
  valuesFrom:
    - secretKeyRef:
        name: wordpress-dna-mariadb-upgrade-values
        namespace: wordpress-dna
        key: values.yaml
  # 共通のデフォルト値はラッパーチャート側にまとめてある。ここにはこのサイト固有の
  # 差分のみを書く。Bitnamiサブチャートへ渡す値は wordpress: 配下に、ラッパー
  # チャート自身の設定(plugins等)は values 直下に置く。
  values:
    # このサイトが使うプラグイン(宣言的)。適用のたびにwp-cliのJobが
    # インストール(バージョン固定)・有効化する。docs/manual-wordpress.md参照。
    # 初期一覧は2026-07-04時点でdevに導入済みのものをコード化した。
    plugins:
      - name: add-to-any
        version: "1.8.18"
      - name: tinymce-advanced
        version: "5.9.2"
      - name: authorizer
        version: "3.14.4"
      - name: breadcrumb-navxt
        version: "7.5.1"
      - name: broken-link-checker
        version: "2.4.8"
      - name: classic-editor
        version: "1.7.0"
      - name: classic-visual-editor-options
        version: "1.0.5"
      - name: classic-widgets
        version: "0.3"
      - name: mobile-menu
        version: "2.8.8"
      - name: wp-seopress
        version: "10.0"
      - name: tablepress
        version: "3.3.2"
      - name: widgets-control
        version: "3.0.0"
      - name: wp-external-links
        version: "2.65"
      - name: wp-file-manager
        version: "8.0.4"
      - name: wp-multibyte-patch
        version: "2.9.3"
      - name: wp-revisions-control
        version: "1.4.4"
    wordpress:
      # 管理者パスワードはGitに含めず、事前に作成したSecretを参照する。
      existingSecret: wordpress-dna-credentials
      mariadb:
        auth:
          existingSecret: wordpress-dna-mariadb-credentials

# Kubernetes APIはNetworkPolicyのportsにprotocol: TCPを自動補完するが、
# Bitnamiチャートのマニフェストには無いため、Fleetが常時「Modified」と
# 誤検知する。ingress部分を差分比較の対象から除外して抑止する。
diff:
  comparePatches:
    - apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      name: wordpress-dna
      namespace: wordpress-dna
      jsonPointers:
        - /spec/ingress
    - apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      name: wordpress-dna-mariadb
      namespace: wordpress-dna
      jsonPointers:
        - /spec/ingress
