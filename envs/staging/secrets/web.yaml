# サイト web (staging環境)の認証情報SealedSecret。
# scripts/seal-site-secrets.sh で生成。封印された値はこの環境のコントローラ
# でのみ復号できる(他環境へのコピー不可。環境ごとに生成し直すこと)。
# パスワードのローテーション手順は docs/manual-wordpress.md 参照。
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wordpress-web-credentials
  namespace: wordpress-web
spec:
  encryptedData:
    wordpress-password: 
  template:
    metadata:
      name: wordpress-web-credentials
      namespace: wordpress-web
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wordpress-web-mariadb-credentials
  namespace: wordpress-web
spec:
  encryptedData:
    mariadb-password: 
    mariadb-root-password: 
  template:
    metadata:
      name: wordpress-web-mariadb-credentials
      namespace: wordpress-web
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wordpress-web-mariadb-upgrade-values
  namespace: wordpress-web
spec:
  encryptedData:
    values.yaml: 
  template:
    metadata:
      name: wordpress-web-mariadb-upgrade-values
      namespace: wordpress-web
    type: Opaque
