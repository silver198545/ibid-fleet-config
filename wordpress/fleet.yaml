defaultNamespace: wordpress
targetNamespace: wordpress

helm:
  chart: wordpress
  repo: https://charts.bitnami.com/bitnami
  version: 32.1.10
  # BitnamiのmariadbサブチャートはHelmアップグレード時、existingSecretを
  # 使っていてもauth.rootPassword/auth.passwordの明示指定を要求してくる
  # (PASSWORDS ERROR)。Gitにパスワードを書かないよう、事前に作成した
  # Secret経由でこれらの値を注入する。docs/manual-wordpress.md参照。
  valuesFrom:
    - secretKeyRef:
        name: wordpress-mariadb-upgrade-values
        namespace: wordpress
        key: values.yaml
  # 共通のデフォルト値は ../wordpress-base-values.yaml にまとめてあり、
  # scripts/deploy-wordpress.sh がここより先に読み込む。ここにはこのサイト固有の
  # 差分のみを書く。
  values:
    # 管理者パスワードは Git に含めず、事前に作成した Secret を参照する。
    # docs/manual-wordpress.md の手順に従って事前に作成すること。
    existingSecret: wordpress-credentials

    # 既存WordPressからのデータ移行のため、旧環境と同じテーブル接頭辞に合わせる。
    # docs/manual-wordpress.md の「バックアップからのリストア」参照。
    wordpressTablePrefix: "tp_"

    # 既存DB(移行済みデータ)に接続する構成のため、初回インストールウィザードを
    # スキップする。falseのままだとchartがwordpressUsername/wordpressEmailの
    # ユーザーをDBから検索して更新しようとし、移行済みDBの実ユーザーと
    # 一致せず `Invalid user ID, email or login` でPodがCrashLoopBackOffする。
    wordpressSkipInstall: true

    mariadb:
      auth:
        existingSecret: wordpress-mariadb-credentials
