server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    # アプリはnuxt.config.jsのrouter.base(/advanced、NODE_ENV=production時)を
    # 前提にビルドされているため、配信パスもそれに合わせる。
    # strategy: 'prefix' のi18n設定によりルートに直接ページが無いため、
    # 既定言語(en)へリダイレクトする。
    location = / {
        return 302 /advanced/en/;
    }

    location = /advanced {
        return 302 /advanced/en/;
    }

    location = /advanced/ {
        return 302 /advanced/en/;
    }

    location /advanced/ {
        try_files $uri $uri/ $uri/index.html =404;
    }
}
