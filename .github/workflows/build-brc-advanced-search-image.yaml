# images/brc-advanced-search/ 配下の変更がmainにマージされたら、
# riken_brc_advanced_search (Nuxt 3, vue3-main-rikenブランチ)のSSRサーバーイメージを
# ビルドしてGHCRへ公開する。
# タグは images/brc-advanced-search/TAG の内容、取り込むアプリ側のコミットは
# images/brc-advanced-search/SRC_REF の内容(vue3-main-rikenブランチのコミットを指定)。
# 公開後、envs/<env>/apps/brc-advanced-search/deployment.yaml の image タグを
# 切り替える(docs/manual-apps.md参照)。
#
# riken_brc_advanced_search はプライベートリポジトリのため、ソース取得には
# 読み取り専用のDeploy Key(riken_brc_advanced_search側に登録済み)に対応する
# 秘密鍵を積んだ BRC_ADVANCED_SEARCH_DEPLOY_KEY シークレットが必要
# (このリポジトリのSettings > Secrets and variables > Actionsで事前に登録しておくこと)。
# fine-grained PAT + tokenでのHTTPS取得は、PENQEincがOrganizationのため
# Organization側の承認/許可設定が別途必要になり試したところ403で失敗したため、
# 承認が不要なDeploy Key(SSH)方式に変更した。
# 認証情報をDockerイメージのビルドコンテキスト/レイヤー履歴に残さないよう、
# cloneはDockerfile内ではなくこのワークフローのactions/checkoutステップで行う。
#
# 初回のみ: 公開されたパッケージ(ghcr.io上の brc-advanced-search)の可視性を
# GitHubのPackage設定で public にすること。
name: build-brc-advanced-search-image

on:
  push:
    branches: [main]
    paths:
      - "images/brc-advanced-search/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SRC_REFを読み込む
        id: src_ref
        run: echo "ref=$(tr -d '[:space:]' < images/brc-advanced-search/SRC_REF)" >> "$GITHUB_OUTPUT"

      - name: アプリ本体(プライベートリポジトリ)をSRC_REF固定で取得
        uses: actions/checkout@v4
        with:
          repository: PENQEinc/riken_brc_advanced_search
          ref: ${{ steps.src_ref.outputs.ref }}
          ssh-key: ${{ secrets.BRC_ADVANCED_SEARCH_DEPLOY_KEY }}
          persist-credentials: false
          path: images/brc-advanced-search/app

      - name: イメージをビルドしてGHCRへpush
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$(tr -d '[:space:]' < images/brc-advanced-search/TAG)"
          IMAGE="ghcr.io/${{ github.repository_owner }}/brc-advanced-search:$TAG"
          echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build -t "$IMAGE" images/brc-advanced-search
          docker push "$IMAGE"
          echo "公開しました: $IMAGE"
