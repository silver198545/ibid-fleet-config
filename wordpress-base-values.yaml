# 全WordPressサイト(wordpress-<site>/, ...)に共通のデフォルトHelm values。
# scripts/deploy-wordpress.sh が各サイトの fleet.yaml の helm.values より先に読み込み、
# サイト固有の値で上書きする形でhelmに渡す。共通設定を変更する場合はこのファイルを、
# サイト固有の設定(existingSecretの名前、テーブル接頭辞など)は各サイトの
# fleet.yaml を編集する。

# Web層: 2レプリカで冗長化。wp-content は Longhorn の
# ReadWriteMany ボリュームで全レプリカ間で共有する。
replicaCount: 2

service:
  type: LoadBalancer

persistence:
  enabled: true
  storageClass: longhorn
  accessModes:
    - ReadWriteMany
  size: 10Gi

wordpressUsername: admin
wordpressEmail: admin@example.com

mariadb:
  enabled: true
  architecture: standalone
  auth:
    database: bitnami_wordpress
    username: bn_wordpress
  primary:
    persistence:
      enabled: true
      storageClass: longhorn
      accessModes:
        - ReadWriteOnce
      size: 8Gi
