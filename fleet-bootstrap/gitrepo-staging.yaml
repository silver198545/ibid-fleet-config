# staging環境用GitRepo。Rancher localクラスタの fleet-default namespaceへ手動適用する。
# envs/staging/ 配下のみを監視し、env=staging ラベルのクラスタへ適用する。
apiVersion: fleet.cattle.io/v1alpha1
kind: GitRepo
metadata:
  name: ibid-staging
  namespace: fleet-default
spec:
  repo: https://github.com/silver198545/ibid-fleet-config
  # リポジトリがPrivateのため認証が必要。fleet-defaultにfine-grained PAT(Contents:Read-only)を
  # kubernetes.io/basic-auth Secretとして事前作成しておくこと(トークン自体はGitに含めない)。
  clientSecretName: auth-55znx
  branch: main
  paths:
    - envs/staging
  targets:
    - name: staging
      clusterSelector:
        matchLabels:
          env: staging
